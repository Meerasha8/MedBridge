{% extends "base.html" %}
{% block title %}Login — MedBridge{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-20 bg-white rounded-xl shadow-sm border border-gray-100 p-8">
  <h1 class="text-2xl font-bold text-dark mb-1">Welcome back</h1>
  <p class="text-gray-500 text-sm mb-6">Login to your MedBridge account</p>

  {% if error %}
  <div class="bg-red-50 text-red-700 border border-red-200 rounded-lg px-4 py-3 text-sm mb-4">{{ error }}</div>
  {% endif %}

  <form method="POST" action="/login" class="space-y-4">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
      <input type="email" name="email" required class="border border-gray-300 rounded-lg px-3 py-2 w-full focus:outline-none focus:ring-2 focus:ring-primary">
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
      <input type="password" name="password" required class="border border-gray-300 rounded-lg px-3 py-2 w-full focus:outline-none focus:ring-2 focus:ring-primary">
    </div>
    <button type="submit" class="w-full bg-primary text-white py-2.5 rounded-lg font-medium hover:bg-secondary transition">Login</button>
  </form>

  <p class="text-sm text-gray-500 mt-6 text-center">
    Don't have an account? <a href="/register" class="text-primary font-medium">Sign up</a>
  </p>
</div>
{% endblock %}
