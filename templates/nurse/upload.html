{% extends "base.html" %}
{% block title %}Upload Document — MedBridge{% endblock %}
{% block content %}
<div class="max-w-xl mx-auto px-6 py-10">
  <h1 class="text-2xl font-bold mb-6">Upload patient document</h1>
  <form method="POST" action="/nurse/appointments/{{ appointment_id }}/upload" class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 space-y-4">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Patient ID</label>
      <input type="text" name="patient_id" required placeholder="patient uuid" class="border border-gray-300 rounded-lg px-3 py-2 w-full">
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Type</label>
      <select name="doc_type" class="border border-gray-300 rounded-lg px-3 py-2 w-full">
        <option value="lab_report">Lab report</option>
        <option value="prescription">Prescription</option>
        <option value="imaging">Imaging</option>
        <option value="vaccination">Vaccination</option>
        <option value="other">Other</option>
      </select>
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">File name</label>
      <input type="text" name="file_name" required class="border border-gray-300 rounded-lg px-3 py-2 w-full">
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">File URL</label>
      <input type="text" name="file_url" required placeholder="https://..." class="border border-gray-300 rounded-lg px-3 py-2 w-full">
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
      <input type="text" name="description" class="border border-gray-300 rounded-lg px-3 py-2 w-full">
    </div>
    <button type="submit" class="w-full bg-primary text-white py-2.5 rounded-lg font-medium hover:bg-secondary transition">Upload</button>
  </form>
</div>
{% endblock %}
