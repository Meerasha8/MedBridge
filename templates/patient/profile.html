{% extends "base.html" %}
{% block title %}My Profile — MedBridge{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto px-6 py-10">
  <h1 class="text-2xl font-bold mb-6">My Profile</h1>
  <form method="POST" action="/patient/profile" class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 grid md:grid-cols-2 gap-4">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Full name</label>
      <input type="text" name="full_name" value="{{ profile.full_name }}" required class="border border-gray-300 rounded-lg px-3 py-2 w-full">
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Phone</label>
      <input type="text" name="phone" value="{{ profile.phone or '' }}" class="border border-gray-300 rounded-lg px-3 py-2 w-full">
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Preferred language</label>
      <select name="language_preference" class="border border-gray-300 rounded-lg px-3 py-2 w-full">
        {% for code, label in [('en','English'),('hi','हिन्दी'),('ta','தமிழ்'),('te','తెలుగు'),('kn','ಕನ್ನಡ'),('ml','മലയാളം'),('bn','বাংলা'),('mr','मराठी'),('gu','ગુજરાતી')] %}
        <option value="{{ code }}" {% if profile.language_preference == code %}selected{% endif %}>{{ label }}</option>
        {% endfor %}
      </select>
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Blood group</label>
      <select name="blood_group" class="border border-gray-300 rounded-lg px-3 py-2 w-full">
        <option value="">Select</option>
        {% for bg in ['A+','A-','B+','B-','AB+','AB-','O+','O-'] %}
        <option value="{{ bg }}" {% if patient.blood_group == bg %}selected{% endif %}>{{ bg }}</option>
        {% endfor %}
      </select>
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Emergency contact name</label>
      <input type="text" name="emergency_contact_name" value="{{ patient.emergency_contact_name or '' }}" class="border border-gray-300 rounded-lg px-3 py-2 w-full">
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Emergency contact phone</label>
      <input type="text" name="emergency_contact_phone" value="{{ patient.emergency_contact_phone or '' }}" class="border border-gray-300 rounded-lg px-3 py-2 w-full">
    </div>
    <div class="md:col-span-2">
      <label class="block text-sm font-medium text-gray-700 mb-1">Allergies (comma separated)</label>
      <input type="text" name="allergies" value="{{ patient.allergies | join(', ') if patient.allergies else '' }}" class="border border-gray-300 rounded-lg px-3 py-2 w-full">
    </div>
    <div class="md:col-span-2">
      <button type="submit" class="bg-primary text-white px-5 py-2.5 rounded-lg hover:bg-secondary transition font-medium">Save changes</button>
    </div>
  </form>
</div>
{% endblock %}
